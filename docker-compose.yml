# Single-command bring-up:  docker compose up --build
#
# Services:
#   db      - PostgreSQL 16 (persistent volume)
#   redis   - Redis 7 (Celery broker + result backend)
#   migrate - one-shot: runs `alembic upgrade head`, then exits
#   api     - FastAPI (uvicorn) on :8000
#   worker  - Celery worker that runs the processing pipeline
#
# `docker compose up` requires NO manual setup. The optional OPENAI_API_KEY is
# read from the host environment (export it before `up`); without it the LLM
# stages degrade gracefully and mark batches as llm_failed.

# Shared environment for the three app containers (migrate/api/worker).
x-app-env: &app-env
  DATABASE_URL: postgresql+psycopg://alemeno:alemeno@db:5432/alemeno
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}

# Shared build config for the three app containers.
x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alemeno
      POSTGRES_PASSWORD: alemeno
      POSTGRES_DB: alemeno
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alemeno -d alemeno"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Runs migrations to completion, then exits. api/worker wait for its success.
  migrate:
    <<: *app-build
    command: alembic upgrade head
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    <<: *app-build
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment: *app-env
    ports:
      # Host port configurable (default 8000). Override if 8000 is taken:
      #   API_PORT=8080 docker compose up
      - "${API_PORT:-8000}:8000"
    volumes:
      - uploads:/app/uploads   # shared with worker: api writes, worker reads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    <<: *app-build
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2
    environment: *app-env
    volumes:
      - uploads:/app/uploads   # shared with api
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
